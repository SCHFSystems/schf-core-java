spring:
  application:
    name: schf-core-java
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:55432/schf_v2}
    username: ${SPRING_DATASOURCE_USERNAME:schf}
    password: ${SPRING_DATASOURCE_PASSWORD:local_dev_only_not_secret}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: ${SCHF_MIGRATION_MAX_ARCHIVE_SIZE:25MB}
      max-request-size: ${SCHF_MIGRATION_MAX_ARCHIVE_SIZE:25MB}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: SCHF Core Java
    version: 0.1.0-SNAPSHOT

schf:
  migration:
    workbench: ${SCHF_MIGRATION_WORKBENCH:${java.io.tmpdir}/schf-migration-workbench}
    maximum-archive-bytes: ${SCHF_MIGRATION_MAX_ARCHIVE_BYTES:26214400}
    maximum-uncompressed-bytes: ${SCHF_MIGRATION_MAX_UNCOMPRESSED_BYTES:104857600}
    maximum-entry-bytes: ${SCHF_MIGRATION_MAX_ENTRY_BYTES:20971520}
    maximum-files: ${SCHF_MIGRATION_MAX_FILES:25}
    batch-size: ${SCHF_MIGRATION_BATCH_SIZE:500}
  tenant:
    strategy: ${SCHF_TENANT_STRATEGY:authenticated}
  security:
    jwt:
      secret: ${SCHF_JWT_SECRET}
      issuer: ${SCHF_JWT_ISSUER:schf-core-java}
      audience: ${SCHF_JWT_AUDIENCE:schf-clients}
      access-token-ttl-seconds: ${SCHF_ACCESS_TOKEN_TTL_SECONDS:900}
      refresh-token-ttl-seconds: ${SCHF_REFRESH_TOKEN_TTL_SECONDS:1209600}
    hardening:
      maximum-failed-logins: ${SCHF_MAXIMUM_FAILED_LOGINS:5}
      lockout-seconds: ${SCHF_LOCKOUT_SECONDS:900}
      rate-limit-window-seconds: ${SCHF_RATE_LIMIT_WINDOW_SECONDS:60}
      login-rate-limit: ${SCHF_LOGIN_RATE_LIMIT:10}
      refresh-rate-limit: ${SCHF_REFRESH_RATE_LIMIT:20}
      forgot-password-rate-limit: ${SCHF_FORGOT_PASSWORD_RATE_LIMIT:5}
      reset-password-rate-limit: ${SCHF_RESET_PASSWORD_RATE_LIMIT:10}
    bootstrap-admin:
      username: ${SCHF_BOOTSTRAP_ADMIN_USERNAME:admin}
      email: ${SCHF_BOOTSTRAP_ADMIN_EMAIL:admin@example.invalid}
      password: ${SCHF_BOOTSTRAP_ADMIN_PASSWORD:local_dev_only_change_me}
