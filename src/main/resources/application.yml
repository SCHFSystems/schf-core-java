spring:
  application:
    name: schf-core-java
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:55432/schf_v2}
    username: ${SPRING_DATASOURCE_USERNAME:schf}
    password: ${SPRING_DATASOURCE_PASSWORD:local_dev_only_not_secret}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: SCHF Core Java
    version: 0.1.0-SNAPSHOT

schf:
  security:
    bootstrap-admin:
      username: ${SCHF_BOOTSTRAP_ADMIN_USERNAME:admin}
      password: ${SCHF_BOOTSTRAP_ADMIN_PASSWORD:local_dev_only_change_me}
