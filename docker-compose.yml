name: schf-core-java

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-schf_v2}
      POSTGRES_USER: ${POSTGRES_USER:-schf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_dev_only_not_secret}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-schf} -d ${POSTGRES_DB:-schf_v2}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6388}:6379"

  app:
    build: .
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-schf_v2}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-schf}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-local_dev_only_not_secret}
      SPRING_PROFILES_ACTIVE: dev
      SCHF_BOOTSTRAP_ADMIN_USERNAME: ${SCHF_BOOTSTRAP_ADMIN_USERNAME:-admin}
      SCHF_BOOTSTRAP_ADMIN_EMAIL: ${SCHF_BOOTSTRAP_ADMIN_EMAIL:-admin@example.invalid}
      SCHF_BOOTSTRAP_ADMIN_PASSWORD: ${SCHF_BOOTSTRAP_ADMIN_PASSWORD:-local_dev_only_change_me}
      SCHF_JWT_SECRET: ${SCHF_JWT_SECRET:-fake_local_development_secret_change_me_64_characters_minimum_1234}
      SCHF_MIGRATION_WORKBENCH: ${SCHF_MIGRATION_WORKBENCH:-/app/migration-workbench}
    volumes:
      - migration-workbench:/app/migration-workbench
    ports:
      - "${APP_PORT:-8088}:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  db-data:
  migration-workbench:
